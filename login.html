<!DOCTYPE html>
<html class="light" data-theme="light" lang="lt">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css"/>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "primary-content": "#ffffff",
                    },
                    fontFamily: {
                        "sans": ["Public Sans", "sans-serif"]
                    },
                },
            },
            daisyui: {
                themes: [
                    {
                        light: {
                            ...require("daisyui/src/theming/themes")["light"],
                            "primary": "#ec5b13",
                            "primary-content": "#ffffff",
                            "base-100": "#ffffff",
                            "base-200": "#f8f6f6",
                        },
                    },
                ],
            },
        }
    </script>
    <style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <title>Prisijungti - Pajamų valdymas</title>
</head>
<body class="bg-base-200 text-base-content min-h-screen">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="card w-full max-w-md bg-base-100 shadow-xl border border-base-300">
            <div class="card-body">
                <div class="text-center mb-6">
                    <h1 class="text-2xl font-bold text-primary">Pajamų valdymas</h1>
                    <p class="text-sm opacity-70 mt-2">Prisijunkite prie savo paskyros</p>
                </div>
                <form class="space-y-4">
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text font-medium">El. paštas</span>
                        </label>
                        <input type="email" placeholder="email@example.com" class="input input-bordered focus:input-primary" required/>
                    </div>
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text font-medium">Slaptažodis</span>
                        </label>
                        <input type="password" placeholder="Įveskite slaptažodį" class="input input-bordered focus:input-primary" required/>
                    </div>
                    <div class="form-control">
                        <label class="label cursor-pointer justify-start">
                            <input type="checkbox" class="checkbox checkbox-primary checkbox-sm"/>
                            <span class="label-text ml-2">Prisiminti mane</span>
                        </label>
                    </div>
                    <div class="form-control mt-6">
                        <button type="submit" class="btn btn-primary w-full">
                            <span class="material-symbols-outlined text-sm mr-2">login</span>
                            Prisijungti
                        </button>
                    </div>
                </form>
                <div class="divider my-6">arba</div>
                <div class="text-center space-y-2">
                    <a href="#" class="link link-primary text-sm">Pamiršote slaptažodį?</a>
                    <p class="text-sm">
                        Neturite paskyros?
                        <a href="#" class="link link-primary font-medium">Registruotis</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
